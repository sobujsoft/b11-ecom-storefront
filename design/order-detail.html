<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Order — B11 Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body data-page="orders" class="bg-white text-neutral-900 antialiased">
    <div id="site-header"></div>

    <main class="mx-auto max-w-5xl px-4 py-8">
        <nav class="mb-6 flex items-center gap-1 text-sm text-neutral-500">
            <a href="orders.html" class="hover:text-neutral-900">My Orders</a>
            <i data-lucide="chevron-right" class="size-4"></i>
            <span id="crumb" class="text-neutral-900"></span>
        </nav>

        <div class="flex flex-wrap items-center justify-between gap-4">
            <div>
                <h1 id="title" class="text-3xl font-bold tracking-tight"></h1>
                <p id="placed" class="mt-1 text-sm text-neutral-500"></p>
            </div>
            <div id="badges" class="flex items-center gap-2"></div>
        </div>

        <!-- Timeline -->
        <div id="timeline" class="mt-8 rounded-xl border border-neutral-200 p-6"></div>

        <div class="mt-8 grid gap-8 lg:grid-cols-3">
            <div class="lg:col-span-2">
                <div class="rounded-xl border border-neutral-200">
                    <div class="border-b border-neutral-200 px-5 py-4"><h2 id="items-title" class="font-semibold"></h2></div>
                    <div id="items" class="divide-y divide-neutral-200"></div>
                </div>
                <a href="orders.html" class="mt-4 inline-flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium hover:bg-neutral-100"><i data-lucide="arrow-left" class="size-4"></i> Back to orders</a>
            </div>

            <div class="space-y-6">
                <div class="rounded-xl border border-neutral-200 p-5">
                    <h2 class="flex items-center gap-2 font-semibold"><i data-lucide="map-pin" class="size-4"></i> Shipping address</h2>
                    <p id="address" class="mt-3 text-sm text-neutral-500"></p>
                </div>
                <div class="rounded-xl border border-neutral-200 p-5">
                    <h2 class="font-semibold">Payment summary</h2>
                    <div class="mt-3 space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-neutral-500">Subtotal</span><span id="subtotal"></span></div>
                        <div class="flex justify-between"><span class="text-neutral-500">Shipping &amp; tax</span><span id="shipping"></span></div>
                        <div class="my-2 h-px bg-neutral-200"></div>
                        <div class="flex justify-between font-semibold"><span>Total</span><span id="total"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="assets/shared.js"></script>
    <script src="assets/orders-data.js"></script>
    <script>
        const STAGES = [
            { key: 'pending', label: 'Order placed' },
            { key: 'processing', label: 'Processing' },
            { key: 'shipped', label: 'Shipped' },
            { key: 'completed', label: 'Delivered' },
        ];

        window.renderPage = function () {
            const id = new URLSearchParams(location.search).get('id') || 1024;
            const o = findOrder(id);
            document.title = `Order #${o.id} — B11 Shop`;
            document.getElementById('crumb').textContent = '#' + o.id;
            document.getElementById('title').textContent = 'Order #' + o.id;
            document.getElementById('placed').textContent = 'Placed on ' + o.date;
            document.getElementById('badges').innerHTML = statusBadge(o.status) + statusBadge(o.payment);
            document.getElementById('items-title').textContent = `Items (${o.items.length})`;
            document.getElementById('address').textContent = o.address;

            // timeline
            const stageIndex = o.status === 'cancelled' ? -1 : STAGES.findIndex((s) => s.key === o.status);
            if (o.status === 'cancelled') {
                document.getElementById('timeline').className = 'mt-8 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-700';
                document.getElementById('timeline').textContent = 'This order was cancelled and the payment was refunded.';
            } else {
                document.getElementById('timeline').innerHTML = `<div class="flex items-center justify-between">${STAGES.map((s, i) => {
                    const done = i <= stageIndex;
                    const leftBar = i === 0 ? 'bg-transparent' : (i <= stageIndex ? 'bg-neutral-900' : 'bg-neutral-200');
                    const rightBar = i === STAGES.length - 1 ? 'bg-transparent' : (i < stageIndex ? 'bg-neutral-900' : 'bg-neutral-200');
                    return `
                    <div class="flex flex-1 flex-col items-center text-center">
                        <div class="flex w-full items-center">
                            <div class="h-0.5 flex-1 ${leftBar}"></div>
                            <span class="grid size-9 shrink-0 place-items-center rounded-full border-2 ${done ? 'border-neutral-900 bg-neutral-900 text-white' : 'border-neutral-200 bg-white text-neutral-400'}"><i data-lucide="${done ? 'check-circle-2' : 'package'}" class="size-4"></i></span>
                            <div class="h-0.5 flex-1 ${rightBar}"></div>
                        </div>
                        <p class="mt-2 text-xs font-medium ${done ? 'text-neutral-900' : 'text-neutral-500'}">${s.label}</p>
                    </div>`;
                }).join('')}</div>`;
            }

            // items
            document.getElementById('items').innerHTML = o.items.map((it) => {
                const p = findProduct(it.id);
                return `
                <div class="flex gap-4 p-5">
                    <a href="product-detail.html?id=${p.id}" class="size-20 shrink-0 overflow-hidden rounded-lg border border-neutral-200 bg-neutral-100"><img src="${p.image}" class="h-full w-full object-cover" /></a>
                    <div class="flex flex-1 justify-between gap-4">
                        <div>
                            <a href="product-detail.html?id=${p.id}" class="font-medium hover:underline">${p.name}</a>
                            <p class="mt-0.5 text-sm text-neutral-500">${p.brand} · Qty ${it.qty}</p>
                            <p class="mt-0.5 text-sm text-neutral-500">${formatPrice(it.price)} each</p>
                        </div>
                        <p class="whitespace-nowrap font-semibold">${formatPrice(it.price * it.qty)}</p>
                    </div>
                </div>`;
            }).join('');

            const subtotal = o.items.reduce((s, i) => s + i.price * i.qty, 0);
            const shipping = Math.max(0, o.total - subtotal);
            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('shipping').textContent = formatPrice(shipping);
            document.getElementById('total').textContent = formatPrice(o.total);
        };
    </script>
</body>
</html>
