<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My Orders — B11 Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body data-page="orders" class="bg-white text-neutral-900 antialiased">
    <div id="site-header"></div>

    <main class="mx-auto max-w-5xl px-4 py-8">
        <h1 class="text-3xl font-bold tracking-tight">My Orders</h1>
        <p class="mt-1 text-sm text-neutral-500">Track and manage your purchases</p>
        <div id="orders" class="mt-8 space-y-4"></div>
    </main>

    <div id="site-footer"></div>

    <script src="assets/shared.js"></script>
    <script src="assets/orders-data.js"></script>
    <script>
        window.renderPage = function () {
            document.getElementById('orders').innerHTML = ORDERS.map((o) => {
                const thumbs = o.items.slice(0, 3).map((it) =>
                    `<div class="size-12 overflow-hidden rounded-lg border-2 border-white bg-neutral-100"><img src="${findProduct(it.id).image}" class="h-full w-full object-cover" /></div>`).join('');
                return `
                <div class="rounded-xl border border-neutral-200">
                    <div class="flex flex-wrap items-center justify-between gap-4 border-b border-neutral-200 bg-neutral-50 px-5 py-4">
                        <div class="flex flex-wrap items-center gap-x-6 gap-y-1">
                            <div><p class="text-xs text-neutral-500">Order</p><p class="text-sm font-semibold">#${o.id}</p></div>
                            <div><p class="text-xs text-neutral-500">Placed</p><p class="text-sm font-medium">${o.date}</p></div>
                            <div><p class="text-xs text-neutral-500">Total</p><p class="text-sm font-semibold">${formatPrice(o.total)}</p></div>
                        </div>
                        <div class="flex items-center gap-2">${statusBadge(o.status)}${statusBadge(o.payment)}</div>
                    </div>
                    <div class="flex items-center justify-between gap-4 px-5 py-4">
                        <div class="flex items-center gap-3">
                            <div class="flex -space-x-3">${thumbs}</div>
                            <p class="text-sm text-neutral-500">${o.items.length} item${o.items.length === 1 ? '' : 's'}</p>
                        </div>
                        <a href="order-detail.html?id=${o.id}" class="inline-flex items-center gap-1 rounded-md border border-neutral-200 px-3 py-1.5 text-sm font-medium hover:bg-neutral-100">View details <i data-lucide="chevron-right" class="size-4"></i></a>
                    </div>
                </div>`;
            }).join('');
        };
    </script>
</body>
</html>
