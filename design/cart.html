<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart — B11 Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body data-page="cart" class="bg-white text-neutral-900 antialiased">
    <div id="site-header"></div>

    <main class="mx-auto max-w-7xl px-4 py-8">
        <h1 class="text-3xl font-bold tracking-tight">Shopping Cart</h1>
        <p class="mt-1 text-sm text-neutral-500"><span id="count">3</span> items in your cart</p>

        <div class="mt-8 grid gap-8 lg:grid-cols-3">
            <div class="lg:col-span-2">
                <div id="items" class="divide-y divide-neutral-200 rounded-xl border border-neutral-200"></div>
                <a href="products.html" class="mt-4 inline-flex items-center gap-2 rounded-md px-3 py-2 text-sm font-medium hover:bg-neutral-100"><i data-lucide="arrow-left" class="size-4"></i> Continue shopping</a>
            </div>

            <div>
                <div class="sticky top-24 rounded-xl border border-neutral-200 p-6">
                    <h2 class="font-semibold">Order Summary</h2>
                    <div class="mt-4 space-y-3 text-sm">
                        <div class="flex justify-between"><span class="text-neutral-500">Subtotal</span><span id="subtotal"></span></div>
                        <div class="flex justify-between"><span class="text-neutral-500">Shipping</span><span id="shipping"></span></div>
                        <div class="flex justify-between"><span class="text-neutral-500">Tax (5%)</span><span id="tax"></span></div>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <input placeholder="Promo code" class="h-9 w-full rounded-md border border-neutral-200 bg-transparent px-3 text-sm outline-none focus:border-neutral-900" />
                        <button class="shrink-0 rounded-md border border-neutral-200 px-4 text-sm font-medium hover:bg-neutral-100">Apply</button>
                    </div>
                    <div class="my-4 h-px bg-neutral-200"></div>
                    <div class="flex justify-between text-base font-semibold"><span>Total</span><span id="total"></span></div>
                    <a href="checkout.html" class="mt-6 block rounded-md bg-neutral-900 py-2.5 text-center text-sm font-medium text-white hover:bg-neutral-800">Proceed to Checkout</a>
                    <p class="mt-3 text-center text-xs text-neutral-500">Secure checkout · Taxes calculated at checkout</p>
                </div>
            </div>
        </div>
    </main>

    <div id="site-footer"></div>

    <script src="assets/shared.js"></script>
    <script>
        const cart = [
            { product: findProduct(1), qty: 1 },
            { product: findProduct(4), qty: 2 },
            { product: findProduct(9), qty: 1 },
        ];

        function lineHTML(item, i) {
            const p = item.product;
            return `
            <div class="flex gap-4 p-4">
                <a href="product-detail.html?id=${p.id}" class="size-24 shrink-0 overflow-hidden rounded-lg border border-neutral-200 bg-neutral-100"><img src="${p.image}" class="h-full w-full object-cover" /></a>
                <div class="flex flex-1 flex-col">
                    <div class="flex justify-between gap-4">
                        <div>
                            <p class="text-xs uppercase text-neutral-500">${p.category}</p>
                            <a href="product-detail.html?id=${p.id}" class="font-semibold hover:underline">${p.name}</a>
                            <p class="mt-0.5 text-sm text-neutral-500">${p.brand}</p>
                        </div>
                        <button class="grid size-9 place-items-center rounded-md text-neutral-500 hover:text-red-600"><i data-lucide="trash-2" class="size-4"></i></button>
                    </div>
                    <div class="mt-auto flex items-center justify-between pt-3">
                        <div class="flex items-center rounded-lg border border-neutral-200">
                            <button class="grid size-8 place-items-center rounded-l-lg hover:bg-neutral-100"><i data-lucide="minus" class="size-3.5"></i></button>
                            <span class="w-10 text-center text-sm font-medium">${item.qty}</span>
                            <button class="grid size-8 place-items-center rounded-r-lg hover:bg-neutral-100"><i data-lucide="plus" class="size-3.5"></i></button>
                        </div>
                        <p class="font-semibold">${formatPrice(p.price * item.qty)}</p>
                    </div>
                </div>
            </div>`;
        }

        window.renderPage = function () {
            document.getElementById('items').innerHTML = cart.map(lineHTML).join('');
            const subtotal = cart.reduce((s, i) => s + i.product.price * i.qty, 0);
            const shipping = subtotal > 100 ? 0 : 9.99;
            const tax = subtotal * 0.05;
            document.getElementById('count').textContent = cart.length;
            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : formatPrice(shipping);
            document.getElementById('tax').textContent = formatPrice(tax);
            document.getElementById('total').textContent = formatPrice(subtotal + shipping + tax);
        };
    </script>
</body>
</html>
